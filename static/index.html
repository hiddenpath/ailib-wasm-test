<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ai-wasm-test — WASM Chat Demo</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  margin: 0; height: 100vh; display: flex; flex-direction: column;
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: #e0e0e0;
}
#header {
  background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
  padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; justify-content: space-between; align-items: center;
}
#header h1 { margin: 0; font-size: 20px; font-weight: 600; color: #4fc3f7; }
#wasm-status { font-size: 12px; color: #aaa; }
#wasm-status.ready { color: #66bb6a; }
#wasm-status.error { color: #ef5350; }
#chat-container {
  flex: 1; display: flex; flex-direction: column; padding: 20px;
  overflow-y: auto; gap: 12px;
}
.message {
  margin: 0; padding: 14px 18px; border-radius: 16px;
  max-width: 80%; word-wrap: break-word; position: relative;
  animation: msgIn 0.25s ease-out;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.user { background: linear-gradient(135deg, #42a5f5, #1976d2); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.assistant { background: rgba(255,255,255,0.08); color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
.system-info {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(79,195,247,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 13px;
  color: #4fc3f7; align-self: center; max-width: 90%; text-align: center;
}
.wasm-badge { font-size: 11px; color: #66bb6a; opacity: 0.7; margin-top: 6px; }
#input-area {
  display: flex; padding: 16px; gap: 10px; align-items: flex-end; flex-wrap: wrap;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.1);
}
#model-select {
  padding: 10px 12px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; background: rgba(255,255,255,0.08);
  color: #e0e0e0; font-size: 14px; min-height: 44px;
}
#message-input {
  flex: 1; padding: 12px 14px; border: 1px solid rgba(79,195,247,0.3);
  border-radius: 10px; font-size: 15px; resize: none;
  min-height: 44px; max-height: 120px;
  background: rgba(255,255,255,0.06); color: #e0e0e0; font-family: inherit;
}
#message-input::placeholder { color: #888; }
#message-input:focus { outline: none; border-color: #4fc3f7; }
.btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; min-height: 44px; transition: all 0.15s ease; }
#send-btn { background: linear-gradient(135deg, #42a5f5, #1976d2); color: #fff; }
#send-btn:hover { filter: brightness(1.1); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#new-chat-btn { background: linear-gradient(135deg, #66bb6a, #388e3c); color: #fff; }
.provider-label { font-size: 11px; color: #4fc3f7; opacity: 0.8; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.usage-info { font-size: 11px; color: #888; margin-top: 8px; padding-top: 6px; border-top: 1px dashed rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div id="header">
  <h1>ai-wasm-test</h1>
  <span id="wasm-status">Loading WASM...</span>
</div>

<div id="chat-container"></div>

<div id="input-area">
  <button id="new-chat-btn" class="btn">+ New Chat</button>
  <select id="model-select">
    <option value="groq/llama-3.1-8b-instant">Groq &bull; Llama 3.1 8B</option>
    <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
  </select>
  <textarea id="message-input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button id="send-btn" class="btn">Send</button>
</div>

<script type="module">
let wasmReady = false;
const statusEl = document.getElementById('wasm-status');

const wasm = await import('./wasm/ailib_wasm.js');
await wasm.default('./wasm/ailib_wasm_bg.wasm');
wasmReady = true;
statusEl.textContent = 'WASM ready';
statusEl.className = 'ready';

const chatContainer = document.getElementById('chat-container');
const input = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const newChatBtn = document.getElementById('new-chat-btn');
const modelSelect = document.getElementById('model-select');

addSystemMessage('WASM module loaded. All AI interactions go through wasm. Start chatting!');

let chatHistory = [];
let isStreaming = false;
let abortController = null;

const PROVIDERS = {
  groq: { baseUrl: 'https://api.groq.com/openai/v1/chat/completions', apiKeyEnv: 'GROQ_API_KEY' },
  deepseek: { baseUrl: 'https://api.deepseek.com/chat/completions', apiKeyEnv: 'DEEPSEEK_API_KEY' },
};

function getModelConfig(modelId) {
  const provider = modelId.split('/')[0];
  const modelName = modelId.split('/').slice(1).join('/');
  const cfg = PROVIDERS[provider];
  if (!cfg) return null;
  return { url: cfg.baseUrl, provider, model: modelName, apiKeyEnv: cfg.apiKeyEnv };
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'message system-info';
  div.textContent = text;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addUserMessage(content) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.textContent = content;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function createAssistantMessage(provider) {
  const div = document.createElement('div');
  div.className = 'message assistant';
  const label = document.createElement('div');
  label.className = 'provider-label';
  label.textContent = '\uD83E\uDD16 ' + (provider || 'unknown');
  div.appendChild(label);
  const content = document.createElement('div');
  content.className = 'message-content';
  content.textContent = '';
  div.appendChild(content);
  const badge = document.createElement('div');
  badge.className = 'wasm-badge';
  badge.textContent = 'parsed via wasm';
  div.appendChild(badge);
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return { div, contentEl: content, usageEl: null, badge };
}

function ensureUsageEl(msg) {
  if (msg.usageEl) return msg.usageEl;
  const el = document.createElement('div');
  el.className = 'usage-info';
  msg.div.appendChild(el);
  msg.usageEl = el;
  return el;
}

async function sendMessage() {
  if (isStreaming || !wasmReady) return;
  const text = input.value;
  if (!text.trim()) return;

  const modelId = modelSelect.value;
  const config = getModelConfig(modelId);
  if (!config) { addSystemMessage('Unknown model: ' + modelId); return; }

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });

  const messagesJson = JSON.stringify([
    { role: 'system', content: 'You are a helpful assistant. Answer concisely.' },
    ...chatHistory,
  ]);

  let buildResult;
  try {
    buildResult = wasm.build_chat_request(messagesJson, config.model, 0.7, 4096, true);
  } catch (e) {
    addSystemMessage('WASM build_chat_request error: ' + e);
    return;
  }

  const requestBody = buildResult.body();
  const isStream = buildResult.stream();
  buildResult.free();

  const proxyPayload = {
    url: config.url,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.parse(requestBody),
    stream: isStream,
  };

  const msg = createAssistantMessage(config.provider);
  isStreaming = true;
  sendBtn.textContent = 'Stop';
  abortController = new AbortController();

  try {
    const endpoint = isStream ? '/api/proxy/stream' : '/api/proxy';
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(proxyPayload),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      const errClass = wasm.classify_error(resp.status);
      const errInfo = `${errClass.code()} (${errClass.name()}) — ${errClass.category()}, retryable=${errClass.retryable()}`;
      errClass.free();
      addSystemMessage('Proxy error: ' + resp.status + ' ' + errInfo);
      msg.contentEl.textContent = '(Error)';
      return;
    }

    if (isStream) {
      await handleStreamResponse(resp, msg, config);
    } else {
      await handleNonStreamResponse(resp, msg, config);
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      msg.contentEl.textContent += '\n(Cancelled)';
    } else {
      addSystemMessage('Request failed: ' + e.message);
      msg.contentEl.textContent = '(Error)';
    }
  } finally {
    isStreaming = false;
    sendBtn.textContent = 'Send';
    abortController = null;
  }
}

async function handleStreamResponse(resp, msg, config) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let accumulated = '';

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const parts = buffer.split('\n\n');
    buffer = parts.pop();

    for (const part of parts) {
      const lines = part.split('\n').filter(l => l.startsWith('data:'));
      for (const line of lines) {
        const data = line.startsWith('data: ') ? line.slice(6) : line.slice(5);

        if (wasm.is_stream_done(data)) {
          chatHistory.push({ role: 'assistant', content: accumulated });
          return;
        }

        if (!data.trim()) continue;

        let eventResult;
        try {
          eventResult = wasm.parse_stream_event(data);
        } catch (e) {
          console.warn('WASM parse_stream_event error:', e, 'data:', data);
          continue;
        }

        const eventType = eventResult.event_type();
        const eventData = eventResult.data();
        const eventDone = eventResult.done();
        eventResult.free();

        if (eventType === 'content_delta') {
          accumulated += eventData;
          msg.contentEl.textContent = accumulated;
          chatContainer.scrollTop = chatContainer.scrollHeight;
        } else if (eventType === 'thinking_delta') {
          accumulated += '\n[Thinking: ' + eventData + ']\n';
          msg.contentEl.textContent = accumulated;
        } else if (eventType === 'stream_end' || eventType === 'done' || eventDone) {
          if (accumulated) {
            chatHistory.push({ role: 'assistant', content: accumulated });
          }
          return;
        } else if (eventType === 'error') {
          addSystemMessage('Stream error: ' + eventData);
          return;
        }
      }
    }
  }

  if (accumulated) {
    chatHistory.push({ role: 'assistant', content: accumulated });
  }
}

async function handleNonStreamResponse(resp, msg, config) {
  const text = await resp.text();
  const json = JSON.parse(text);
  const bodyStr = JSON.stringify(json.body || json);

  let parseResult;
  try {
    parseResult = wasm.parse_chat_response(bodyStr);
  } catch (e) {
    addSystemMessage('WASM parse_chat_response error: ' + e);
    msg.contentEl.textContent = '(Parse error)';
    return;
  }

  const content = parseResult.content();
  const finishReason = parseResult.finish_reason();
  const promptTokens = parseResult.prompt_tokens();
  const completionTokens = parseResult.completion_tokens();
  const totalTokens = parseResult.total_tokens();
  parseResult.free();

  if (content) {
    msg.contentEl.textContent = content;
    chatHistory.push({ role: 'assistant', content });
  } else {
    msg.contentEl.textContent = '(Empty response)';
  }

  if (Number(totalTokens) > 0) {
    const usageEl = ensureUsageEl(msg);
    usageEl.textContent = `Tokens — prompt: ${promptTokens}, completion: ${completionTokens}, total: ${totalTokens}`;
  }
}

sendBtn.addEventListener('click', () => {
  if (isStreaming) {
    if (abortController) abortController.abort();
  } else {
    sendMessage();
  }
});

newChatBtn.addEventListener('click', () => {
  chatHistory = [];
  chatContainer.innerHTML = '';
  addSystemMessage('New chat started. History cleared.');
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
